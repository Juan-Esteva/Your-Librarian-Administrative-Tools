<script>
  
  function initHelpEditor(){

   helpSetEditor("helpDocument");

    /*    Barra superior   */

    document.getElementById("contextToolbar").innerHTML =

        '<div style="display:flex;align-items:center;width:100%;">'+

            '<div style="display:flex;gap:8px;">'+

                '<button onclick="insertTemplate()">Plantilla</button>'+
      
'<button onclick="editTemplate()">Editar plantilla</button>'+
      
'<button onclick="restoreTemplate()">Restaurar plantilla</button>'+

'<span style="display:inline-block;width:1px;height:24px;background:#bdbdbd;margin:0 10px;vertical-align:middle;"></span>'+

'<button onclick="clearHelp()">Borrar</button>'+

            '</div>'+

            '<div style="margin-left:auto;display:flex;align-items:center;gap:8px;">'+

                '<span>🌐</span>'+

                '<select id="languageSelector" onchange="changeLanguage(this.value)" style="width:80px;"></select>'+

                '<button onclick="saveHelp()">Guardar</button>'+

            '</div>'+

        '</div>';


    /*   Barra del editor   */


    const toolbar = document.getElementById("helpToolbar");

    toolbar.innerHTML =

        '<button onclick="insertPermissions()">P</button>' +

        '<button onclick="insertPermissionsAll()">P*</button>' +

        '<button onclick="insertPermissionsPublic()">P-</button>' +

        '<button onclick="helpExec(\'bold\')"><b>B</b></button>' +

        '<button onclick="helpExec(\'italic\')"><i>I</i></button>' +

        '<button onclick="helpExec(\'underline\')"><u>U</u></button>' +

        '<button onclick="helpH1()">H1</button>' +

        '<button onclick="helpH2()">H2</button>' +

        '<button onclick="helpBulletList()">•</button>' +

        '<button onclick="helpNumberList()">1.</button>' +

        '<button onclick="helpAlignLeft()" title="Alinear a la izquierda">'+
'<svg width="18" height="18" viewBox="0 0 18 18">'+
'<path d="M2 3H11M2 6H15M2 9H10M2 12H14M2 15H8" '+
'stroke="#000" stroke-width="1.4" stroke-linecap="round"/>'+
'</svg></button>' +

        '<button onclick="helpAlignCenter()" title="Centrar">'+
'<svg width="18" height="18" viewBox="0 0 18 18">'+
'<path d="M4 3H14M2 6H16M4 9H14M2 12H16M5 15H13" '+
'stroke="#000" stroke-width="1.4" stroke-linecap="round"/>'+
'</svg></button>' +

        '<button onclick="helpAlignRight()" title="Alinear a la derecha">'+
'<svg width="18" height="18" viewBox="0 0 18 18">'+
'<path d="M7 3H16M3 6H16M8 9H16M4 12H16M10 15H16" '+
'stroke="#000" stroke-width="1.4" stroke-linecap="round"/>'+
'</svg></button>' +

        '<button onclick="helpJustify()" title="Justificar">'+
'<svg width="18" height="18" viewBox="0 0 18 18">'+
'<path d="M2 3H16M2 6H16M2 9H16M2 12H16M2 15H16" '+
'stroke="#000" stroke-width="1.4" stroke-linecap="round"/>'+
'</svg></button>' +

        '<button onclick="helpInsertLink()">Link</button>' +

        '<button onclick="helpInsertCode()">Código</button>' +

        '<button onclick="helpInsertResource()" title="Insertar recurso">'+

'<svg width="16" height="16" viewBox="0 0 24 24" >'+
'<path d="M16.5 6.5l-7.8 7.8a3 3 0 104.2 4.2l8.5-8.5a5 5 0 10-7.1-7.1L5.8 11.4" '+
'fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
'</svg>'+

'Recursos</button>' ;


    /*   Inicialización del editor   */

    const editor = helpGetEditor();

    if(!editor.dataset.initialized){

        ["mouseup","keyup","mouseleave"].forEach(function(ev){

            editor.addEventListener(ev,helpSaveSelection);

        });

        editor.addEventListener("keydown",function(ev){

            if(ev.key!=="Backspace")
                return;

            const sel = window.getSelection();

            if(!sel.rangeCount)
                return;

            const range = sel.getRangeAt(0);

            if(!range.collapsed)
                return;

            if(range.startOffset!==0)
                return;

            let node = range.startContainer;

            if(node.nodeType===Node.TEXT_NODE)
                node = node.parentNode;

            while(node &&
                  node.parentNode!==editor &&
                  node!==editor){

                node = node.parentNode;

            }

            if(!node || node===editor)
                return;

            const prev = node.previousElementSibling;

            if(prev && prev.tagName==="TABLE"){

                ev.preventDefault();

                prev.remove();

                helpSaveSelection();

            }

        });

        editor.dataset.initialized = "1";

    }

    /*   Idioma   */

    google.script.run
        .withSuccessHandler(loadLanguageSelector)
        .withFailureHandler(function(err){
            dcAlert(err.message,"Idioma");
        })
        .YLGetCurrentLanguage();


    /*   Comandos   */

    google.script.run
        .withSuccessHandler(function(commands){

            buildCommandList(commands);

            if(commands.length){

                const first=document.querySelector("#helpCommandsList .helpCommand");

                if(first) first.click();

            }

        })
        .withFailureHandler(function(err){

            dcAlert(err.message,"Comandos");

        })
        .YLGetCommandList();

}

</script>
