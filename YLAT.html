    </button>

<div id="contextToolbar">

</div>

<div id="workArea">

    <div id="idleLogo">

        <img src="https://drive.google.com/thumbnail?id=1b3yCFi8EEVIuVI667UTVQ4zWJrDM-5XB&sz=w400">

    </div>

    <?!= include('TableEditor'); ?>
    <?!= include('HelpEditor'); ?>

<span id="status">
Listo
</span>

<?!= include('dcLibrary'); ?>

<script>

let currentModule = null;

const modules = {

    tables : {

        container : "tableContainer",

        init : function(){},

        show : function(){

            document.getElementById("tableContainer").style.display="block";

        }

    },

    help : {

    container : "helpContainer",

    init : function(){

        initHelpEditor();

    },

    show : function(){

        document.getElementById("helpContainer").style.display="block";

    }

    }

};

const VERSION = {

    product : "YLAT",

    version : "1.0",

    build   : 2

};

function activateModule(name){

    Object.values(modules).forEach(m=>{

        document.getElementById(m.container).style.display="none";

    });

    document.getElementById("idleLogo").style.display="none";

    currentModule = modules[name];

    currentModule.init();

    currentModule.show();

}

function setStatus(
msg
){

document

.getElementById(
"status"
)

.innerText =
msg;

}

function showTables(){

    activateModule("tables");

    document.getElementById("contextToolbar").innerHTML =

        '<button onclick="loadTable(\'config\')">CONFIG</button>' +

        '<button onclick="loadTable(\'commands\')">COMMANDS</button>' +

        '<button onclick="loadTable(\'users\')">USERS</button>' +

        '<button onclick="loadTable(\'catalog\')">CATALOG</button>' +

        '<button style="margin-left:auto" onclick="saveTable()">Guardar</button>';

    setStatus("Editor de Tablas");

}

function showTools(){

    document.getElementById("tableContainer").style.display = "none";
    document.getElementById("helpContainer").style.display  = "none";
    document.getElementById("idleLogo").style.display       = "flex";

    document.getElementById("contextToolbar").innerHTML =

        '<button onclick="showHelpEditor()">Editor de Ayuda</button>';

    setStatus("Herramientas");

}

function showIdle(){

    document.getElementById("workArea").innerHTML =

        '<div style="height:70vh;display:flex;justify-content:center;align-items:center;">'+

        '<img '+

        'src="https://drive.google.com/thumbnail?id=1b3yCFi8EEVIuVI667UTVQ4zWJrDM-5XB&sz=w400" '+

        'style="width:320px;opacity:.08;">'+

        '</div>';

}

function showHelpEditor(){

    activateModule("help");

    document.getElementById("contextToolbar").innerHTML =

        '<button onclick="initHelpEditor()">Recargar</button>';

    setStatus("Editor de Ayuda");

}
  
</script>
