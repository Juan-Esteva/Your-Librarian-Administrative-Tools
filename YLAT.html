<script>

let currentModule = null;

const modules = {

    tables : {

        initialized : true,

        container : "tableContainer",

        init : function(){},

        show : function(){

            document.getElementById("tableContainer").style.display = "block";

        }

    },

    tools : {

    initialized : true,

    container : null,

    init : function(){},

    show : function(){

        document.getElementById("contextToolbar").innerHTML =

            '<button onclick="showHelpEditor()">Editor de Ayuda</button>' +

            '<button onclick="activateModule(\'news\');setStatus(\'Editor de Novedades\');">Editor de Novedades</button>';

        document.getElementById("idleLogo").style.display = "flex";

    }

},

    help : {

        initialized : false,

        container : "helpContainer",

        init : initHelpEditor,

        show : function(){

    document.getElementById("helpContainer").style.display = "block";

        }

    },

    news : {

        initialized : false,

        container : "newsContainer",

        init : initNewsEditor,

        show : function(){

            document.getElementById("newsContainer").style.display = "flex";

        }

    }

};

const VERSION = {

    product : "YLAT",

    version : "1.0",

    build   : 2

};

function initInterface(){

    google.script.run

        .withSuccessHandler(function(cfg){

            const logo =
                "https://drive.google.com/thumbnail?id=" +
                cfg.logoFileId +
                "&sz=w200";

            const background =
                "https://drive.google.com/thumbnail?id=" +
                cfg.backgroundFileId +
                "&sz=w700";

            document.getElementById("logo").src =
                logo;

            document.querySelector("#idleLogo img").src =
                background;

        })

        .YLGetInterfaceConfig();

}

function activateModule(name){

    Object.values(modules).forEach(function(m){

        if(m.container){

            document.getElementById(m.container).style.display = "none";

        }

    });

    document.getElementById("idleLogo").style.display = "none";

    currentModule = modules[name];

    if(name==="help"){

        initHelpEditor();

        modules.help.initialized = true;

    }
    else if(name==="news"){

        initNewsEditor();

        modules.news.initialized = true;

    }
    else if(!currentModule.initialized){

        currentModule.init();

        currentModule.initialized = true;

    }

    currentModule.show();

}
  
function setStatus(msg,busy=false){

    const status = document.getElementById("status");

    status.innerText = msg;

    if(busy)

        status.classList.add("busy");

    else

        status.classList.remove("busy");

}

function showTables(){

    activateModule("tables");

    document.getElementById("contextToolbar").innerHTML =

        '<button onclick="loadTable(\'config\')">CONFIG</button>' +

        '<button onclick="loadTable(\'commands\')">COMMANDS</button>' +

        '<button onclick="loadTable(\'users\')">USERS</button>' +

        '<button onclick="loadTable(\'catalog\')">CATALOG</button>' +

        '<button style="margin-left:auto" onclick="saveTable()">Guardar</button>';

    setStatus("Editor de Tablas");

}

function showTools(){

    activateModule("tools");

    setStatus("Herramientas");

}

function showHelpEditor(){

    activateModule("help");

    setStatus("Editor de Ayuda");

}

function trace(module,functionName,message){

    google.script.run
        .withFailureHandler(function(err){

            alert(err.message);

        })
        .YLTrace(
            module,
            functionName,
            message
        );

}

/*   Pantalla inicial   */

function showHome(){

    Object.values(modules).forEach(function(m){

        if(m.container){

            document.getElementById(m.container).style.display="none";

        }

    });

    document.getElementById("contextToolbar").innerHTML="";

    document.getElementById("idleLogo").style.display="flex";

    currentModule = null;

    setStatus("Listo");

}

initInterface();

showHome();


  
</script>
