<div id="helpContainer" style="display:none;height:100%;">

<style>

#helpLayout{
    display:flex;
    height:100%;
    border:1px solid #ccc;
    border-radius:10px;
    overflow:hidden;
    background:white;
}

#helpCommands{

    width:150px;
    min-width:150px;
    max-width:150px;

    border-right:1px solid #ddd;
    overflow-y:auto;
    background:#fafafa;

}

#helpCommandsHeader{

    padding:10px;

    font-weight:bold;

    background:#f0f0f0;

    border-bottom:1px solid #ddd;

}

#helpCommandsList{

    padding:0;

    margin:0;

}

.helpCommand{

    padding:8px 12px;

    cursor:pointer;

    border-bottom:1px solid #eee;

}

.helpCommand:hover{

    background:#dff5ff;

}

.helpCommand.selected{

    background:#8ce6ff;

    font-weight:bold;

}

#helpEditorArea{

    flex:1;

    display:flex;

    flex-direction:column;

}

#helpToolbar{

    padding:8px;

    border-bottom:1px solid #ddd;

    background:#f8f8f8;

}

#helpDocument{

    flex:1;

    padding:18px;

    overflow:auto;

    outline:none;

    font-family:Arial,sans-serif;

    font-size:14px;

    line-height:1.5;

}

#helpDocument,
#helpDocument p,
#helpDocument li,
#helpDocument td,
#helpDocument th,
#helpDocument div{

    font-family:inherit;

    font-size:inherit;

    line-height:inherit;

}

#helpDocument h1{

    font-size:26px;

    margin:0 0 12px 0;

}

#helpDocument h2{

    font-size:20px;

    margin:18px 0 10px 0;

}

#helpDocument pre{

    background:#f7f7f7;

    border:1px solid #ddd;

    border-radius:6px;

    padding:10px;

    overflow:auto;

}

#helpDocument code{

    font-family:Consolas,monospace;

    font-size:13px;

}

#helpToolbar button{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:4px;

    min-width:34px;

    height:32px;

    padding:0 10px;

    margin-right:5px;

    border:1px solid #bdbdbd;

    border-radius:4px;

    background:#f8f8f8;

    cursor:pointer;

    font-size:13px;

    vertical-align:middle;

}

#helpToolbar button svg{

    display:block;

    flex:none;

}

#helpToolbar button:hover{

    background:#e8f4ff;

}

#statusBar{

    height:22px;
    line-height:22px;
    padding-left:8px;
    font-size:12px;

}

.statusBusy{

    color:#0066cc;
    font-weight:bold;
    animation:blink 1s linear infinite;

}

@keyframes blink{

    50%{

        opacity:.25;

    }

}

#imageSizer{

    position:absolute;

    background:white;

    border:1px solid #999;

    border-radius:8px;

    padding:8px;

    box-shadow:0 2px 8px rgba(0,0,0,.25);

    z-index:1000;

}

#imageSizer input{

    width:220px;

}
  
</style>

<div id="helpLayout">

    <div id="helpCommands">

        <div id="helpCommandsHeader">

            Comandos

        </div>

        <div id="helpCommandsList"></div>

    </div>

    <div id="helpEditorArea">

        <div id="helpToolbar"></div>

        <div id="helpDocument" contenteditable="true"></div>

    </div>

</div>

</div>

<script>

    
    let currentLanguage = null;

    let currentMode = "HELP";

    let currentCommand = null;


function clearHelp(){

    if(currentMode==="TEMPLATE"){

        dcConfirm(

            "¿Desea borrar completamente la plantilla?",

            function(){

                document.getElementById("helpDocument").innerHTML="";

                document.getElementById("helpDocument").focus();

            }

        );

        return;

    }

    if(!currentCommand){

        dcAlert("No hay ningún comando seleccionado.");

        return;

    }

    dcConfirm(

        '¿Desea borrar completamente la ayuda del comando "' +

        currentCommand +

        '"?',

        function(){

            document.getElementById("helpDocument").innerHTML="";

            document.getElementById("helpDocument").focus();

        }

    );

}



//
// Lista de comandos
//

function buildCommandList(commands){

    const panel = document.getElementById("helpCommandsList");

    panel.innerHTML = "";

    commands.forEach(cmd=>{

        const div = document.createElement("div");

        div.className = "helpCommand";

        div.textContent = cmd;

        div.addEventListener("click", function(){

            selectCommand(cmd, div);

        });

        panel.appendChild(div);

    });

}

/*    Idiomas    */


function loadLanguageSelector(language){

    currentLanguage = language || "ES";

    const selector =

        document.getElementById(
            "languageSelector"
        );

    selector.innerHTML = "";

    HELP_LANGUAGES.forEach(function(lang){

        const option =

            document.createElement("option");

        option.value = lang;
        option.textContent = lang;

        if(lang===currentLanguage)
            option.selected = true;

        selector.appendChild(option);

    });


}

function changeLanguage(language){

    currentLanguage = language;

    if(currentMode==="TEMPLATE"){

        editTemplate();

        return;

    }

    if(currentCommand){

        const selected =

            document.querySelector(
                "#helpCommandsList .helpCommand.selected"
            );

        if(selected){

            selectCommand(
                currentCommand,
                selected
            );

        }

    }

}

function selectCommand(cmd, element){

    currentMode = "HELP";
    
    currentCommand = cmd;

    document
        .querySelectorAll("#helpCommandsList .helpCommand")
        .forEach(item => item.classList.remove("selected"));

    element.classList.add("selected");

    setStatus("Cargando ayuda...");

    google.script.run

        .withSuccessHandler(function(help){

            document.getElementById("helpDocument").innerHTML =
                help.html;

            setStatus("Editor de Ayuda");

        

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(err.message,"Error");

        })

        .YLGetHelp(

    cmd,

    currentLanguage

);

}
//
// Documento
//

//
// Utilidades
//

function saveHelp(){

    const html =
        document.getElementById("helpDocument").innerHTML;

    setStatus("Guardando...",true);

    if(currentMode==="TEMPLATE"){

        google.script.run

            .withSuccessHandler(function(){

                setStatus("Plantilla guardada");

                setTimeout(function(){

                    setStatus("Editando plantilla");

                },1500);

            })

            .withFailureHandler(function(err){

                setStatus("Error");

                dcAlert(
                    err.message,
                    "Plantilla"
                );

            })

            .YLSaveTemplate(

                currentLanguage,

                html

            );

        return;

    }

    if(!currentCommand){

        dcAlert(
            "No hay ningún comando seleccionado."
        );

        setStatus("Editor de Ayuda");

        return;

    }

    google.script.run

        .withSuccessHandler(function(){

            setStatus("Guardado");

            setTimeout(function(){

                setStatus("Editor de Ayuda");

            },1500);

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(
                err.message,
                "Error guardando"
            );

        })

        .YLSaveCurrentHelp(

            currentCommand,

            html,

            currentLanguage

        );

}

  
function editTemplate(){

    currentMode = "TEMPLATE";

    google.script.run

        .withSuccessHandler(function(html){

            document.getElementById("helpDocument").innerHTML = html;

            setStatus("Editando plantilla");

        })

        .withFailureHandler(function(err){

            dcAlert(err.message,"Plantilla");

        })

        .YLGetTemplate(currentLanguage);

}

  
function insertTemplate(){

    google.script.run

        .withSuccessHandler(function(html){

            helpInsertHTML(html);

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Plantilla"
            );

        })

        .YLGetTemplate(currentLanguage);

}




  
function restoreTemplate(){

    dcConfirm(

        "¿Desea restaurar la plantilla original?\n\nSe perderán todas las modificaciones realizadas a la plantilla actual.",

        function(){

            setStatus("Restaurando plantilla...",true);

            google.script.run

                .withSuccessHandler(function(html){

                    document.getElementById("helpDocument").innerHTML = html;

                    currentMode = "TEMPLATE";

                    setStatus("Plantilla restaurada");

                    setTimeout(function(){

                        setStatus("Editando plantilla");

                    },1500);

                })

                .withFailureHandler(function(err){

                    setStatus("Error");

                    dcAlert(err.message,"Plantilla");

                })

                .YLRestoreTemplate(currentLanguage);

        }

    );

}

</script>
