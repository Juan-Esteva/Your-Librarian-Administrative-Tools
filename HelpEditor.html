<script>

    const HELP_LANGUAGES = [

    "ES",

    "EN",

    "IT",

    "FR",

    "RU",

    "CN"

];

    let currentLanguage = null;

    let currentMode = "HELP";

    let currentCommand = null;
 

/* HelpEditorCode.js */

//
// Motor del editor (autónomo)
//

const helpEditor = {

    editor : null,

    savedRange : null

};

function helpSetEditor(id){

    helpEditor.editor = document.getElementById(id);

    return helpEditor.editor;

}

function helpGetEditor(){

    return helpEditor.editor;

}

function helpFocus(){

    if(helpEditor.editor)

        helpEditor.editor.focus();

}

function helpSaveSelection(){

    const sel = window.getSelection();

    if(!sel.rangeCount)
        return false;

    helpEditor.savedRange =

        sel.getRangeAt(0).cloneRange();

    return true;

}

function helpRestoreSelection(){

    if(!helpEditor.savedRange)
        return false;

    const sel = window.getSelection();

    sel.removeAllRanges();

    sel.addRange(

        helpEditor.savedRange

    );

    return true;

}

function helpExec(cmd,value=null){

    helpFocus();

    if(helpEditor.savedRange){

        const sel = window.getSelection();

        sel.removeAllRanges();

        sel.addRange(helpEditor.savedRange);

    }

    document.execCommand(

        cmd,

        false,

        value

    );

    helpSaveSelection();

    helpFocus();

}

function helpInsertHTML(html){

    helpRestoreSelection();

    document.execCommand(

        "insertHTML",

        false,

        html

    );

    helpSaveSelection();

    helpFocus();

    return true;

}


function helpBold(){

    helpExec("bold");

}

function helpItalic(){

    helpExec("italic");

}

function helpUnderline(){

    helpExec("underline");

}

function helpH1(){

    helpExec(

        "formatBlock",

        "H1"

    );

}

function helpH2(){

    helpExec(

        "formatBlock",

        "H2"

    );

}

function helpBulletList(){

    helpExec(

        "insertUnorderedList"

    );

}

function helpNumberList(){

    helpExec(

        "insertOrderedList"

    );

}

function helpAlignLeft(){

    helpExec("justifyLeft");

}

function helpAlignCenter(){

    helpExec("justifyCenter");

}

function helpAlignRight(){

    helpExec("justifyRight");

}

function helpJustify(){

    helpExec("justifyFull");

}

async function helpInsertLink(){

    const sel = window.getSelection();

    if(!sel.rangeCount){

        dcAlert(
            "Seleccione primero el texto que desea convertir en enlace."
        );

        return;

    }

    helpSaveSelection();

    const text = sel.toString().trim();

    if(text===""){

        dcAlert(
            "Seleccione primero el texto que desea convertir en enlace."
        );

        return;

    }

    const url = await dcPrompt(

        "Dirección del enlace:",

        "https://"

    );

    if(!url)
        return;

    helpInsertHTML(

        '<a href="' +

        url +

        '" target="_blank">' +

        text +

        '</a>'

    );

}

function helpInsertCode(){

    const sel = window.getSelection();

    if(!sel.rangeCount)
        return;

    const text = sel.toString();

    helpInsertHTML(

        "<pre><code>" +

        text +

        "</code></pre>"

    );

}

                '<button onclick="saveHelp()">Guardar</button>'+

        '</div>';

'<svg width="16" height="16" viewBox="0 0 24 24" >'+

'</svg>'+

'Recursos</button>' ;


    /*   Inicialización del editor   */
  
    const editor = helpGetEditor();

    if(!editor.dataset.initialized){

        ["mouseup","keyup","mouseleave"].forEach(function(ev){

            editor.addEventListener(ev,helpSaveSelection);

        });

        editor.dataset.initialized = "1";

    }

    /*   Idioma   */
    
    google.script.run
        .withSuccessHandler(loadLanguageSelector)
        .withFailureHandler(function(err){
            dcAlert(err.message,"Idioma");
        })

    /*   Comandos   */
    
    google.script.run
        .withSuccessHandler(function(commands){

            buildCommandList(commands);

            if(commands.length){

                const first=document.querySelector("#helpCommandsList .helpCommand");

                if(first) first.click();

}

function clearHelp(){

    if(currentMode==="TEMPLATE"){

        dcConfirm(

            "¿Desea borrar completamente la plantilla?",

            function(){

                document.getElementById("helpDocument").innerHTML="";

                document.getElementById("helpDocument").focus();

            }

        );

        return;

    }

    if(!currentCommand){

        dcAlert("No hay ningún comando seleccionado.");

        return;

    }

    dcConfirm(

        '¿Desea borrar completamente la ayuda del comando "' +

        currentCommand +

        '"?',

        function(){

            document.getElementById("helpDocument").innerHTML="";

            document.getElementById("helpDocument").focus();

        }

    );

}



//
// Lista de comandos
//

function buildCommandList(commands){

    const panel = document.getElementById("helpCommandsList");

    panel.innerHTML = "";

    commands.forEach(cmd=>{

        const div = document.createElement("div");

        div.className = "helpCommand";

        div.textContent = cmd;

        div.addEventListener("click", function(){

            selectCommand(cmd, div);

        });

        panel.appendChild(div);

    });

}

/*    Idiomas    */


function loadLanguageSelector(language){

    currentLanguage = language || "ES";

    const selector =

        document.getElementById(
            "languageSelector"
        );

    selector.innerHTML = "";

    HELP_LANGUAGES.forEach(function(lang){

        const option =

            document.createElement("option");

        option.value = lang;
        option.textContent = lang;

        if(lang===currentLanguage)
            option.selected = true;

        selector.appendChild(option);

    });


}



function changeLanguage(language){

    currentLanguage = language;

    if(currentMode==="TEMPLATE"){

        editTemplate();

        return;

    }

    if(currentCommand){

        const selected =

            document.querySelector(
                "#helpCommandsList .helpCommand.selected"
            );

        if(selected){

            selectCommand(
                currentCommand,
                selected
            );

        }

    }

}

function selectCommand(cmd, element){

    currentMode = "HELP";
    
    currentCommand = cmd;

    document
        .querySelectorAll("#helpCommandsList .helpCommand")
        .forEach(item => item.classList.remove("selected"));

    element.classList.add("selected");

    setStatus("Cargando ayuda...");

    google.script.run

        .withSuccessHandler(function(help){

            document.getElementById("helpDocument").innerHTML =
                help.html;

            setStatus("Editor de Ayuda");

        

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(err.message,"Error");

        })

        .YLGetHelp(

    cmd,

    currentLanguage

);

}

function saveHelp(){

    const html =
        document.getElementById("helpDocument").innerHTML;

    setStatus("Guardando...",true);

    if(currentMode==="TEMPLATE"){

        google.script.run

            .withSuccessHandler(function(){

                setStatus("Plantilla guardada");

                setTimeout(function(){

                    setStatus("Editando plantilla");

                },1500);

            })

            .withFailureHandler(function(err){

                setStatus("Error");

                dcAlert(
                    err.message,
                    "Plantilla"
                );

            })

            .YLSaveTemplate(

                currentLanguage,

                html

            );

        return;

    }

    if(!currentCommand){

        dcAlert(
            "No hay ningún comando seleccionado."
        );

        setStatus("Editor de Ayuda");

        return;

    }

    google.script.run

        .withSuccessHandler(function(){

            setStatus("Guardado");

            setTimeout(function(){

                setStatus("Editor de Ayuda");

            },1500);

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(
                err.message,
                "Error guardando"
            );

        })

        .YLSaveCurrentHelp(

            currentCommand,

            html,

            currentLanguage

        );

}

  
function editTemplate(){

    currentMode = "TEMPLATE";

    google.script.run

        .withSuccessHandler(function(html){

            document.getElementById("helpDocument").innerHTML = html;

            setStatus("Editando plantilla");

        })

        .withFailureHandler(function(err){

            dcAlert(err.message,"Plantilla");

        })

        .YLGetTemplate(currentLanguage);

}

  
function insertTemplate(){

    google.script.run

        .withSuccessHandler(function(html){

            helpInsertHTML(html);

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Plantilla"
            );

        })

        .YLGetTemplate(currentLanguage);

}

function showResourceBrowser(list){

    if(!list || list.length===0){

        dcAlert(
            "La carpeta no contiene recursos.",
            "Administrador de Recursos"
        );

        return;

    }

    window.fmList = list;

    let html =

        '<div style="'+
            'max-height:420px;'+
            'overflow-y:auto;'+
            'overflow-x:auto;'+
        '">'+

        '<table style="'+
            'border-collapse:collapse;'+
            'width:max-content;'+
            'min-width:100%;'+
        '">';

    html +=

        '<tr style="background:#eef7fc;">'+

            '<th style="'+
                'text-align:left;'+
                'padding:6px 10px;'+
                'white-space:nowrap;'+
            '">'+
                'Nombre'+
            '</th>'+

            '<th style="'+
                'width:120px;'+
                'text-align:right;'+
                'padding:6px 10px;'+
                'white-space:nowrap;'+
            '">'+
                'Tamaño'+
            '</th>'+

        '</tr>';

    list.forEach(function(f,i){

        html +=

            '<tr '+
                'onclick="FMSelect('+i+')" '+
                'style="cursor:pointer;">'+

                '<td style="'+
                    'padding:6px 10px;'+
                    'border-bottom:1px solid #ddd;'+
                    'white-space:nowrap;'+
                '">'+
                    f.name+
                '</td>'+

                '<td style="'+
                    'padding:6px 10px;'+
                    'text-align:right;'+
                    'border-bottom:1px solid #ddd;'+
                    'white-space:nowrap;'+
                '">'+
                    Math.round(f.size/1024)+
                    ' KB'+
                '</td>'+

            '</tr>';

    });

    html +=

        '</table>'+
        '</div>';

    dcDialog(

        "Administrador de Recursos (" +
        list.length +
        ")",

        html

    );

}

function FMSelect(index){

    const f = window.fmList[index];

    let html;

    if(f.mime.startsWith("image/")){

        html =

            '<img '+
                'src="'+f.imageUrl+'" '+
                'alt="'+f.name+'" '+
                'title="'+f.name+'" '+
                'style="'+
                    'display:block;'+
                    'margin:12px auto;'+
                    'max-width:100%;'+
                    'height:auto;'+
                '">';

    }
    else{

        let icon = "📎";

        if(f.mime.startsWith("audio/"))

            icon = "🎵";

        else if(f.mime.startsWith("video/"))

            icon = "🎬";

        else if(

            f.mime.indexOf("pdf") >= 0 ||

            f.mime.indexOf("document") >= 0 ||

            f.mime.indexOf("sheet") >= 0 ||

            f.mime.indexOf("presentation") >= 0 ||

            f.mime.indexOf("text") >= 0

        )

            icon = "📄";

        html =

            '<a '+
                'href="'+f.url+'" '+
                'target="_blank" '+
                'title="'+f.name+'">'+
                icon+' '+f.name+
            '</a>';

    }

    dcCloseDialog();

    setTimeout(function(){

        helpFocus();
      /*

        helpRestoreSelection();

        helpInsertHTML(html);

      */
      const editor = helpGetEditor();

      editor.focus();

      editor.innerHTML += html;

    },0);

}
