<div id="helpContainer" style="display:none;height:70vh;">

<style>

#helpLayout{
    display:flex;
    height:100%;
    border:1px solid #ccc;
    border-radius:10px;
    overflow:hidden;
    background:white;
}

#helpCommands{

    width:150px;
    min-width:150px;
    max-width:150px;

    border-right:1px solid #ddd;
    overflow-y:auto;
    background:#fafafa;

}

#helpCommandsHeader{

    padding:10px;

    font-weight:bold;

    background:#f0f0f0;

    border-bottom:1px solid #ddd;

}

#helpCommandsList{

    padding:0;

    margin:0;

}

.helpCommand{

    padding:8px 12px;

    cursor:pointer;

    border-bottom:1px solid #eee;

}

.helpCommand:hover{

    background:#dff5ff;

}

.helpCommand.selected{

    background:#8ce6ff;

    font-weight:bold;

}

#helpEditorArea{

    flex:1;

    display:flex;

    flex-direction:column;

}

#helpToolbar{

    padding:8px;

    border-bottom:1px solid #ddd;

    background:#f8f8f8;

}

#helpDocument{

    flex:1;

    padding:18px;

    overflow:auto;

    outline:none;

    font-family:Arial,sans-serif;

    font-size:14px;

    line-height:1.5;

}

#helpDocument,
#helpDocument p,
#helpDocument li,
#helpDocument td,
#helpDocument th,
#helpDocument div{

    font-family:inherit;

    font-size:inherit;

    line-height:inherit;

}

#helpDocument h1{

    font-size:26px;

    margin:0 0 12px 0;

}

#helpDocument h2{

    font-size:20px;

    margin:18px 0 10px 0;

}

#helpDocument pre{

    background:#f7f7f7;

    border:1px solid #ddd;

    border-radius:6px;

    padding:10px;

    overflow:auto;

}

#helpDocument code{

    font-family:Consolas,monospace;

    font-size:13px;

}

.permissionsTable{

    border-collapse:collapse;

    margin:0 0 18px 0;

    font-family:Arial,sans-serif;

    font-size:12px;

}

.permissionsTable th{

    width:36px;

    height:22px;

    border:2px solid #555;

    background:#f3f3f3;

    text-align:center;

    font-family:Arial,sans-serif;

    font-size:12px;

    font-weight:bold;

}

.permissionsTable td{

    width:36px;

    height:26px;

    border:2px solid #555;

    text-align:center;

    vertical-align:middle;

    font-family:Arial,sans-serif;

    font-size:14px;

    font-weight:bold;

    line-height:1;

}

</style>

<div id="helpLayout">

    <div id="helpCommands">

        <div id="helpCommandsHeader">

            Comandos

        </div>

        <div id="helpCommandsList"></div>

    </div>

    <div id="helpEditorArea">

        <div id="helpToolbar">

        <button onclick="insertPermissions()">P</button>

        <button onclick="exec('bold')"><b>B</b></button>

        <button onclick="exec('italic')"><i>I</i></button>

        <button onclick="exec('underline')"><u>U</u></button>

        <button onclick="exec('formatBlock','H1')">H1</button>

        <button onclick="exec('formatBlock','H2')">H2</button>

        <button onclick="exec('insertUnorderedList')">• Lista</button>

        <button onclick="exec('insertOrderedList')">1. Lista</button>

        <button onclick="insertLink()">Link</button>

        <button onclick="insertCode()">Código</button>

        </div>

        <div id="helpDocument" contenteditable="true"></div>

    </div>

</div>

</div>

<script>

    const HELP_LANGUAGES = [

    "ES",

    "EN",

    "IT",

    "FR",

    "RU",

    "CN"

];

    let currentLanguage = null;

    let savedRange = null;

    let currentMode = "HELP";

    let currentCommand = null;
  

//
// HelpEditorCode.js
//


//
// Inicialización
//

function initHelpEditor(){

    document.getElementById("contextToolbar").innerHTML =

        '<button onclick="saveHelp()">Guardar</button>' +

        '<button onclick="insertTemplate()">Plantilla</button>' +

        '<button onclick="editTemplate()">Editar plantilla</button>' +

        '<span style="margin-left:24px;"> 🌐 </span>' +

        '<select ' +

'id="languageSelector" ' +

'onchange="changeLanguage(this.value)" ' +

'style="width:80px;">' +

'</select>';

    google.script.run

    .withSuccessHandler(function(language){

        loadLanguageSelector(language);

    })

    .YLGetCurrentLanguage();
  
    google.script.run

        .withSuccessHandler(function(commands){

            buildCommandList(commands);

            if(commands.length){

                const first = document.querySelector(
                    "#helpCommandsList .helpCommand"
                );

                if(first){

                    first.click();

                }

            }

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Error cargando comandos"
            );

        })

        .YLGetCommandList();

        const editor = document.getElementById("helpDocument");

        if(!editor.dataset.initialized){

            editor.addEventListener("mouseup", saveSelection);

            editor.addEventListener("keyup", saveSelection);

            editor.addEventListener("mouseleave", saveSelection);

            editor.dataset.initialized = "1";

        }

}

function saveSelection(){

    const sel = window.getSelection();

    if(sel.rangeCount){

        savedRange = sel.getRangeAt(0).cloneRange();

    }

}

function restoreSelection(){

    if(!savedRange)
        return false;

    const sel = window.getSelection();

    sel.removeAllRanges();

    sel.addRange(savedRange);

    return true;

}
//
// Lista de comandos
//

function buildCommandList(commands){

    const panel = document.getElementById("helpCommandsList");

    panel.innerHTML = "";

    commands.forEach(cmd=>{

        const div = document.createElement("div");

        div.className = "helpCommand";

        div.textContent = cmd;

        div.addEventListener("click", function(){

            selectCommand(cmd, div);

        });

        panel.appendChild(div);

    });

}

function selectCommand(cmd, element){

    currentMode = "HELP";
    
    currentCommand = cmd;

    document
        .querySelectorAll("#helpCommandsList .helpCommand")
        .forEach(item => item.classList.remove("selected"));

    element.classList.add("selected");

    setStatus("Cargando ayuda...");

    google.script.run

        .withSuccessHandler(function(help){

            document.getElementById("helpDocument").innerHTML =
                help.html;

            setStatus("Editor de Ayuda");

        

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(err.message,"Error");

        })

        .YLGetHelp(

    cmd,

    currentLanguage

);

}
//
// Documento
//

//
// Utilidades
//

function saveHelp(){

    const html =
        document.getElementById("helpDocument").innerHTML;

    setStatus("Guardando...",true);

    if(currentMode==="TEMPLATE"){

        google.script.run

            .withSuccessHandler(function(){

                setStatus("Plantilla guardada");

                setTimeout(function(){

                    setStatus("Editando plantilla");

                },1500);

            })

            .withFailureHandler(function(err){

                setStatus("Error");

                dcAlert(
                    err.message,
                    "Plantilla"
                );

            })

            .YLSaveTemplate(

                currentLanguage,

                html

            );

        return;

    }

    if(!currentCommand){

        dcAlert(
            "No hay ningún comando seleccionado."
        );

        setStatus("Editor de Ayuda");

        return;

    }

    google.script.run

        .withSuccessHandler(function(){

            setStatus("Guardado");

            setTimeout(function(){

                setStatus("Editor de Ayuda");

            },1500);

        })

        .withFailureHandler(function(err){

            setStatus("Error");

            dcAlert(
                err.message,
                "Error guardando"
            );

        })

        .YLSaveCurrentHelp(

            currentCommand,

            html,

            currentLanguage

        );

}

function exec(cmd,value=null){

    document.execCommand(
        cmd,
        false,
        value
    );

    document.getElementById(
        "helpDocument"
    ).focus();

}

async function insertLink(){

    const url = await dcPrompt(

        "Dirección del enlace:",

        "https://"

    );

    if(!url)
        return;

    const texto = await dcPrompt(

        "Texto del enlace:",

        url

    );

    if(!texto)
        return;

    insertHTMLAtCursor(

        '<a href="' +

        url +

        '" target="_blank">' +

        texto +

        '</a>'

    );

}
  
function insertCode(){

    const sel = window.getSelection();

    if(!sel.rangeCount)
        return;

    const text = sel.toString();

    document.execCommand(
        "insertHTML",
        false,
        "<pre><code>"+text+"</code></pre>"
    );

}

function insertTemplate(){

    google.script.run

        .withSuccessHandler(function(html){

            insertHTMLAtCursor(html);

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Plantilla"
            );

        })

        .YLGetTemplate(currentLanguage);

}

function insertHTMLAtCursor(html){

    if(!restoreSelection())
        return false;

    const range = savedRange.cloneRange();

    const fragment = range.createContextualFragment(html);

    range.deleteContents();

    range.insertNode(fragment);

    saveSelection();

    document.getElementById("helpDocument").focus();

    return true;

}

function insertPermissions(){

    if(!currentCommand){

        dcAlert(
            "No hay ningún comando seleccionado."
        );

        return;

    }

    google.script.run

        .withSuccessHandler(function(p){

            const dot = "✓";
          
            const html =

                '<table class="permissionsTable">' +

                '<tr>' +

                    '<th>SU</th>' +

                    '<th>AD</th>' +

                    '<th>UL</th>' +

                    '<th>US</th>' +

                '</tr>' +

                '<tr>' +

                    '<td>' + (p.SU ? dot : "") + '</td>' +

                    '<td>' + (p.AD ? dot : "") + '</td>' +

                    '<td>' + (p.UL ? dot : "") + '</td>' +

                    '<td>' + (p.US ? dot : "") + '</td>' +

                '</tr>' +

                '</table>';

            insertHTMLAtCursor(html + "<p><br></p><p><br></p>");

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Permisos"
            );

        })

        .YLGetCommandPermissions(currentCommand);

}

function loadLanguageSelector(defaultLanguage){

    currentLanguage = defaultLanguage;

    const sel = document.getElementById("languageSelector");

    sel.innerHTML = "";

    HELP_LANGUAGES.forEach(function(lang){

        const option = document.createElement("option");

        option.value = lang;

        option.textContent = lang;

        option.selected = (lang === defaultLanguage);

        sel.appendChild(option);

    });

}

function changeLanguage(language){

    currentLanguage = language;

    if(currentCommand){

        const selected = document.querySelector(
            "#helpCommandsList .helpCommand.selected"
        );

        if(selected){

            selectCommand(
                currentCommand,
                selected
            );

        }

    }

}

function editTemplate(){

    google.script.run

        .withSuccessHandler(function(html){

            currentMode = "TEMPLATE";

            currentCommand = null;

            document
                .querySelectorAll("#helpCommandsList .helpCommand")
                .forEach(item=>item.classList.remove("selected"));

            document.getElementById("helpDocument").innerHTML = html;

            setStatus(
                "Editando plantilla (" +
                currentLanguage +
                ")"
            );

        })

        .withFailureHandler(function(err){

            dcAlert(
                err.message,
                "Plantilla"
            );

        })

        .YLGetTemplate(currentLanguage);

}


  
</script>
