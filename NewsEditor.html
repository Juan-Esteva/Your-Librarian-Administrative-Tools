<style>

@keyframes blinkLoading{

    0%   { opacity:1; }

    50%  { opacity:.25; }

    100% { opacity:1; }

}

.loadingBlink{

    animation: blinkLoading .9s infinite;

}

</style>

<div
    id="newsContainer"
    style="
          display:none;
          position:relative;
          height:100%;
          width:100%;
          overflow:hidden;

          background:#ffffff;
          box-sizing:border-box;
          padding:10px;

          flex-direction:column;
    ">

    <div id="newsHeader">

        <table style="width:100%;border-collapse:collapse;">

            <tr>

                <td style="width:70px;">
                    <b>Título</b>
                </td>

                <td>

                    <input
                        id="newsTitle"
                        type="text"
                        style="
                            width:100%;
                            box-sizing:border-box;
                            padding:4px 6px;
                            background:#ffffff;
                            border:1px solid #b8b8b8;
                            border-radius:4px;
                        ">

                </td>

            </tr>

            <tr>

                <td colspan="2" style="padding-top:8px;">

                    <label
                        title="Incluir en el reporte diario"
                        style="margin-right:18px;">

                        <input id="newsDaily" type="checkbox">

                        Diario

                    </label>

                    <label
                        title="Incluir en el reporte semanal"
                        style="margin-right:18px;">

                        <input id="newsWeekly" type="checkbox">

                        Semanal

                    </label>

                    <label
                        title="Incluir en el reporte mensual"
                        style="margin-right:18px;">

                        <input id="newsMonthly" type="checkbox">

                        Mensual

                    </label>

                    <label
                        title="Incluir en el catálogo"
                        style="margin-right:18px;">

                        <input id="newsCatalog" type="checkbox">

                        Catálogo

                    </label>

                    <label
                        title="Conservar la gacetilla después de ser publicada">

                        <input id="newsPreserve" type="checkbox">

                        Mantener activa

                    </label>

                </td>

            </tr>

        </table>

    </div>

    <div id="newsToolbar"></div>

    <div
    id="newsDocument"
    contenteditable="true"
    style="
        flex:1;

        overflow:auto;

        border:1px solid #b8b8b8;

        border-radius:6px;

        padding:12px;

        background:#ffffff;

        margin-top:8px;

        margin-bottom:10px;

        box-sizing:border-box;

        min-height:0;
    ">
    </div>

  <div
    id="newsImageSizer"
    style="
        display:none;
        margin-top:8px;
        padding:8px;
        background:#eef7fc;
        border:1px solid #b8dceb;
        border-radius:6px;
        text-align:center;
    ">

    <div
        style="
            font-weight:bold;
            margin-bottom:6px;
        ">

        Tamaño de la imagen

    </div>

    <div
        style="
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
        ">

        <input
            id="newsImageSlider"
            type="range"
            min="10"
            max="100"
            value="100"
            oninput="newsUpdateImageSize()"
            style="width:50%;">

        <span
            id="newsImageValue"
            style="
                width:50px;
                text-align:left;
                font-weight:bold;
            ">

            100%

        </span>

    </div>

  </div>


    <div
    id="newsFooter"
    style="
        margin-top:auto;
        padding-top:8px;
    ">

        <button onclick="saveNews()">

            Guardar

        </button>

        <button onclick="deleteNews()">

            Eliminar

        </button>

    </div>

</div>

<script>

  let newsCurrentImage = null;

function initNewsEditor(){

    const header = document.getElementById("newsHeader");

    header.style.background = "#eef7fc";
    header.style.border = "1px solid #b8dceb";
    header.style.borderRadius = "6px";
    header.style.padding = "8px";
    header.style.marginBottom = "8px";

    const toolbar = document.getElementById("newsToolbar");

    toolbar.style.background = "#f5f5f5";
    toolbar.style.border = "1px solid #cccccc";
    toolbar.style.borderRadius = "6px";
    toolbar.style.padding = "6px";
    toolbar.style.marginBottom = "8px";

    const editor = document.getElementById("newsDocument");

    htmlSetEditor("newsDocument");

    toolbar.innerHTML =

    '<style>'+

    '.newsTB{'+
        'width:42px;'+
        'height:38px;'+
        'margin-right:4px;'+
        'padding:0;'+
        'vertical-align:middle;'+
    '}'+

    '.newsTBWide{'+
        'width:70px;'+
        'height:38px;'+
        'margin-right:4px;'+
        'padding:0;'+
        'vertical-align:middle;'+
    '}'+

    '.newsTBExtra{'+
        'width:100px;'+
        'height:38px;'+
        'padding:0;'+
        'vertical-align:middle;'+
    '}'+

    '.newsTBSeparator{'+
        'display:inline-block;'+
        'width:1px;'+
        'height:24px;'+
        'margin:0 10px;'+
        'background:#bdbdbd;'+
        'vertical-align:middle;'+
    '}'+

    '</style>' +

    '<button class="newsTB" onclick="htmlBold()"><b>B</b></button>' +

    '<button class="newsTB" onclick="htmlItalic()"><i>I</i></button>' +

    '<button class="newsTB" onclick="htmlUnderline()"><u>U</u></button>' +

    '<button class="newsTB" onclick="htmlH1()">H1</button>' +

    '<button class="newsTB" onclick="htmlH2()">H2</button>' +

    '<button class="newsTB" onclick="htmlBulletList()">•</button>' +

    '<button class="newsTB" onclick="htmlNumberList()">1.</button>' +

    '<button class="newsTB" onclick="htmlAlignLeft()">'+
        '<svg width="16" height="16" viewBox="0 0 16 16">'+
            '<path d="M2 3H12M2 6H9M2 9H13M2 12H10" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>'+
        '</svg>'+
    '</button>' +

    '<button class="newsTB" onclick="htmlAlignCenter()">'+
        '<svg width="16" height="16" viewBox="0 0 16 16">'+
            '<path d="M4 3H12M3 6H13M4 9H12M3 12H13" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>'+
        '</svg>'+
    '</button>' +

    '<button class="newsTB" onclick="htmlAlignRight()">'+
        '<svg width="16" height="16" viewBox="0 0 16 16">'+
            '<path d="M4 3H14M7 6H14M3 9H14M6 12H14" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>'+
        '</svg>'+
    '</button>' +

    '<button class="newsTB" onclick="htmlJustify()">'+
        '<svg width="16" height="16" viewBox="0 0 16 16">'+
            '<path d="M2 3H14M2 6H14M2 9H14M2 12H14" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>'+
        '</svg>'+
    '</button>' +

    '<span class="newsTBSeparator"></span>' +

    '<button class="newsTBWide" onclick="htmlInsertLink()">Link</button>' +

    '<button class="newsTBExtra" onclick="newsInsertResource()">Recursos</button>';
  

    if(!editor.dataset.initialized){

        editor.addEventListener(
            "mouseup",
            htmlSaveSelection
        );

        editor.addEventListener(
            "keyup",
            htmlSaveSelection
        );

        editor.addEventListener(
            "mouseleave",
            htmlSaveSelection
        );
        editor.addEventListener(

            "click",

        newsEditorClick

        );

        editor.dataset.initialized = "1";

    }

    loadNews();

}

function loadNews(){

    google.script.run

        .withSuccessHandler(function(news){

            document.getElementById("newsTitle").value =

                news.title || "";

            document.getElementById("newsDaily").checked =

                !!news.daily;

            document.getElementById("newsWeekly").checked =

                !!news.weekly;

            document.getElementById("newsMonthly").checked =

                !!news.monthly;

            document.getElementById("newsCatalog").checked =

                !!news.catalog;

            document.getElementById("newsPreserve").checked =

                !!news.preserve;

            document.getElementById("newsDocument").innerHTML =

                news.html || "";

        })

        .withFailureHandler(function(err){

            dcAlert(

                err.message,

                "Editor de Novedades"

            );

        })

        .YLGetNews();

}

function saveNews(){

    const news = {

        title : document
            .getElementById("newsTitle")
            .value
            .trim(),

        daily : document
            .getElementById("newsDaily")
            .checked,

        weekly : document
            .getElementById("newsWeekly")
            .checked,

        monthly : document
            .getElementById("newsMonthly")
            .checked,

        catalog : document
            .getElementById("newsCatalog")
            .checked,

        preserve : document
            .getElementById("newsPreserve")
            .checked,

        html : document
            .getElementById("newsDocument")
            .innerHTML

    };

    google.script.run

        .withSuccessHandler(function(){

            dcAlert(

                "La gacetilla fue guardada correctamente.",

                "EDN"

            );

            loadNews();

        })

        .withFailureHandler(function(err){

            dcAlert(

                err.message,

                "EDN"

            );

        })

        .YLSaveNews(news);

}

function deleteNews(){

    dcConfirm(

        "¿Eliminar la gacetilla activa?",

        function(){

            google.script.run

                .withSuccessHandler(function(){

    document.getElementById("newsTitle").value = "";

    document.getElementById("newsDaily").checked = true;

    document.getElementById("newsWeekly").checked = false;

    document.getElementById("newsMonthly").checked = false;

    document.getElementById("newsCatalog").checked = false;

    document.getElementById("newsPreserve").checked = true;

    document.getElementById("newsDocument").innerHTML = "";

    newsCurrentImage = null;

    newsHideImageSizer();

    document.getElementById("newsTitle").focus();

    dcAlert(
        "La gacetilla fue eliminada.",
        "EDN"
    );

})

                .withFailureHandler(function(err){

                    dcAlert(

                        err.message,

                        "EDN"

                    );

                })

                .YLDeleteNews();

        },

        "EDN"

    );

}

  function newsInsertResource(){

    newsShowResourceBrowser();

  }


  function newsShowResourceBrowser(){

    const html =

    '<div style="display:flex;flex-direction:column;height:100%;padding:10px;box-sizing:border-box;">'+

        '<div style="margin-bottom:10px;">'+

            '<button onclick="newsChangeResourceType(\'IMAGE\')">Imágenes</button> '+

            '<button onclick="newsChangeResourceType(\'DOCUMENT\')">Documentos</button> '+

            '<button onclick="newsChangeResourceType(\'AUDIO\')">Audio</button> '+

            '<button onclick="newsChangeResourceType(\'VIDEO\')">Video</button>'+

        '</div>'+

        '<div '+
            'id="newsResourceList" '+
            'style="'+
                'flex:1;'+
                'border:1px solid #bdbdbd;'+
                'border-radius:4px;'+
                'overflow:auto;'+
                'padding:8px;'+
                'background:#fff;'+
            '">'+

            '<div style="color:#777;padding:12px;">'+
                'Seleccione una categoría.'+
            '</div>'+

        '</div>'+

    '</div>';

    dcDialog(

        "Administrador de Recursos",

        html,

        {

            width : 760,

            height : 520

        }

    );

  }

  function newsChangeResourceType(type){

    const panel = document.getElementById("newsResourceList");

    panel.innerHTML =

    '<div '+
        'class="loadingBlink" '+
        'style="padding:20px;text-align:center;color:#666;font-weight:bold;">'+

        'Cargando recursos...'+

    '</div>';

    google.script.run

        .withSuccessHandler(function(list){

            newsShowResourceList(list);

        })

        .withFailureHandler(function(err){

            panel.innerHTML =

                '<div style="padding:20px;color:#b00020;">'+

                    err.message+

                '</div>';

        })

        .FMListResources(type);

  }

  function newsShowResourceList(list){

    const panel =

        document.getElementById("newsResourceList");

    if(!list || list.length===0){

        panel.innerHTML =

            '<div style="padding:20px;color:#666;">'+

                'La carpeta no contiene recursos.'+

            '</div>';

        return;

    }

    window.newsResourceList = list;

    let html =

        '<table style="'+
            'width:100%;'+
            'border-collapse:collapse;'+
        '">';

    html +=

        '<tr style="background:#eef7fc;">'+

            '<th style="text-align:left;padding:6px 10px;">'+
                'Nombre'+
            '</th>'+

            '<th style="width:110px;text-align:right;padding:6px 10px;">'+
                'Tamaño'+
            '</th>'+

        '</tr>';

    list.forEach(function(f,index){

        html +=

            '<tr '+
                'onclick="newsSelectResource('+index+')" '+
                'style="cursor:pointer;">'+

                '<td style="'+
                    'padding:6px 10px;'+
                    'border-bottom:1px solid #ddd;">'+

                    f.name+

                '</td>'+

                '<td style="'+
                    'padding:6px 10px;'+
                    'text-align:right;'+
                    'border-bottom:1px solid #ddd;">'+

                    Math.round(f.size/1024)+' KB'+

                '</td>'+

            '</tr>';

    });

    html += '</table>';

    panel.innerHTML = html;

  }

  function newsSelectResource(index){

    const f = window.newsResourceList[index];

    const html = newsBuildResourceHTML(f);

    dcCloseDialog();

    setTimeout(function(){

        htmlFocus();

        if(!htmlInsertHTML(html)){

            const editor = htmlGetEditor();

            editor.focus();

            editor.innerHTML += html;

        }

    },0);

  }

  function newsBuildResourceHTML(f){

    if(f.mime.startsWith("image/")){

        return  '<img '+
                    'src="'+f.imageUrl+'" '+
                    'alt="'+f.name+'" '+
                    'title="'+f.name+'" '+
                    'style="'+
                        'display:block;'+
                        'margin:12px auto;'+
                        'max-width:100%;'+
                        'height:auto;'+
                    '"><br><br>';
    }

    let icon="[FILE] ";

    if(f.mime.startsWith("audio/"))

        icon="[AUDIO] ";

    else if(f.mime.startsWith("video/"))

        icon="[VIDEO] ";

    else

        icon="[DOC] ";

    return  '<a '+
                'href="'+f.url+'" '+
                'target="_blank" '+
                'title="'+f.name+'">'+

                icon+" "+f.name+

            '</a>';

  }

function newsEditorClick(ev){

  trace(

    "EDN",

    "newsEditorClick",

    "target=" + ev.target.tagName

);

    if(ev.target.tagName==="IMG"){

        if(newsCurrentImage)

            newsCurrentImage.style.outline = "none";

        newsCurrentImage = ev.target;

        newsCurrentImage.style.outline =
            "2px solid #3b82f6";

        newsShowImageSizer(newsCurrentImage);

    }
    else{

        if(newsCurrentImage){

            newsCurrentImage.style.outline = "none";

            newsCurrentImage = null;

        }

        newsHideImageSizer();

    }

}

function newsShowImageSizer(img){

    const sizer =
        document.getElementById("newsImageSizer");

    const slider =
        document.getElementById("newsImageSlider");

    const value =
        document.getElementById("newsImageValue");

    let percent = 100;

    if(img.style.width &&
       img.style.width.endsWith("%")){

        percent =
            parseInt(img.style.width,10);

    }

    slider.value = percent;

    value.textContent =
        percent + "%";

    sizer.style.display =
        "block";

    document.addEventListener(
    "keydown",
    newsImageSizerKeyDown
);

}

function newsHideImageSizer(){

    document
        .getElementById("newsImageSizer")
        .style.display = "none";

    document.removeEventListener(
        "keydown",
        newsImageSizerKeyDown
    );

}

function newsUpdateImageSize(){

    if(!newsCurrentImage)
        return;

    const slider =
        document.getElementById("newsImageSlider");

    const value =
        document.getElementById("newsImageValue");

    const percent =
        parseInt(slider.value,10);

    value.textContent =
        percent + "%";

    newsCurrentImage.style.width =
        percent + "%";

    newsCurrentImage.style.height =
        "auto";

}

  function newsImageSizerKeyDown(ev){

    if(ev.key !== "Delete")
        return;

    if(!newsCurrentImage)
        return;

    ev.preventDefault();

    dcConfirm(

        "¿Eliminar la imagen seleccionada?",

        function(){

            newsCurrentImage.remove();

            newsCurrentImage = null;

            newsHideImageSizer();

        },

        "Editor de Novedades"

    );

  }

</script>
